global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # =========================================================================
  # 1. PROMETHEUS INTERNAL METRICS
  # =========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # =========================================================================
  # 2. DOCKER CONTAINERS METRICS (via Docker Stats Exporter)
  # =========================================================================
  - job_name: 'docker-containers'
    static_configs:
      - targets: ['docker-stats-exporter:9487']

  # =========================================================================
  # 3. NODE EXPORTER HOST METRICS
  # =========================================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # =========================================================================
  # 4. KONG GATEWAY METRICS
  # =========================================================================
  - job_name: 'kong-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['kong:8001']
