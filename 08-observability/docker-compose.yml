version: '3.8'

services:
  # =========================================================================
  # 1. PROMETHEUS (Metrics DB)
  # =========================================================================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    mem_limit: 1g
    cpus: 0.5
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - mms-network
      - kong-net

  # =========================================================================
  # 2. GRAFANA (Visualization Dashboard)
  # =========================================================================
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    mem_limit: 512m
    cpus: 0.5
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    ports:
      - "3000:3000"
    networks:
      - mms-network
      - kong-net

  # =========================================================================
  # 3. GRAFANA LOKI (Log DB)
  # =========================================================================
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    mem_limit: 1g
    cpus: 0.5
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    user: "root"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - mms-network
      - kong-net

  # =========================================================================
  # 4. PROMTAIL (Log Collector)
  # =========================================================================
  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    mem_limit: 256m
    cpus: 0.25
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../log:/var/log/apps:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - mms-network
      - kong-net

  # =========================================================================
  # 5. DOCKER STATS EXPORTER (Windows/WSL2 Compatible Container Metrics)
  # =========================================================================
  docker-stats-exporter:
    image: wywywywy/docker_stats_exporter:latest
    container_name: docker-stats-exporter
    mem_limit: 256m
    cpus: 0.25
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9487:9487"
    networks:
      - mms-network

  # =========================================================================
  # 6. NODE EXPORTER (Host Hardware Metrics)
  # =========================================================================
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    mem_limit: 256m
    cpus: 0.25
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - mms-network

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  kong-net:
    name: 07-kong_kong-net
    external: true
  mms-network:
    external: true
