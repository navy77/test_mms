services:
  dashboard-backend:
    build: ./backend
    image: mic/dashboard-backend:1.0.0
    container_name: dashboard-backend
    ports:
      - "8001:8001"
    restart: always
    environment:
      - TZ=Asia/Bangkok
    env_file:
      - ../.env
    volumes:
      - ./backend/log:/app/log
    networks:
      - mms-network

  dashboard-frontend:
    build: ./frontend
    image: mic/dashboard-frontend:1.0.0
    container_name: dashboard-frontend
    ports:
      - "8000:3000"
    restart: always
    environment:
      - TZ=Asia/Bangkok
    env_file:
      - ../.env
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - mms-network

networks:
  mms-network:
    external: true
