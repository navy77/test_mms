services:
  dashboard-backend:
    build:
      context: ./backend
    image: mic/dashboard-backend:1.0.0
    container_name: dashboard-backend
    mem_limit: 2g
    cpus: 1
    restart: always
    env_file:
      - ../.env
    environment:
      - TZ=Asia/Bangkok
      - LOG_DIR=/var/log/apps
      - BENTHOS_KAFKA_CLICKHOUSE_CONFIG=/app/benthos/kafka-clickhouse.yaml
    ports:
      - "${DASHBOARD_PORT:-8001}:8001"
    volumes:
      - ./backend/log:/var/log/apps
      - ../02-Benthos/03-KafkaClickhouse/benthos.yaml:/app/benthos/kafka-clickhouse.yaml
    networks:
      - mms-network

  dashboard-frontend:
    build:
      context: ./frontend
    image: mic/dashboard-frontend:1.0.0
    container_name: dashboard-frontend
    mem_limit: 2g
    cpus: 1
    restart: always
    env_file:
      - ../.env
    environment:
      - TZ=Asia/Bangkok
      - HOST=0.0.0.0
      - PORT=1311
    ports:
      - "${FRONTEND_PORT:-1311}:1311"
    depends_on:
      - dashboard-backend
    networks:
      - mms-network

networks:
  mms-network:
    external: true
