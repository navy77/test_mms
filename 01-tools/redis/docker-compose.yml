services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - 6379:6379
    command: redis-server --save 60 1 --loglevel warning
    restart: always
    networks:
      - mms-network
    volumes:
      - redis_data:/d

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - 5540:5540
    restart: always
    networks:
      - mms-network
    depends_on:
      - redis


volumes:
  redis_data:

networks:
  mms-network:
    external: true