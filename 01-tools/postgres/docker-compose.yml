services:

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iiot_db
    ports:
      - 5432:5432
    restart: always
    networks:
      - mms-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  
networks:
  mms-network:
    external: true