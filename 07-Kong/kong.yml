              policy: local
          - name: key-auth

  - name: status-monthly-service
    url: http://api-rest:8003/api/v1/status/monthly
    routes:
      - name: status-monthly-route
        paths:
          - /mic/api/v1/status/monthly
        strip_path: true
        methods:
          - GET
        plugins:
