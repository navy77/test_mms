# =========================================================================
# 4. STATIC CONSUMERS & CREDENTIALS DEFINITION
# =========================================================================
consumers:
  - username: external-client
    keyauth_credentials:
      - key: sawadeeja

# =========================================================================
# 5. GLOBAL PLUGINS (Active across all services)
# =========================================================================
plugins:
  - name: prometheus
    enabled: true
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

