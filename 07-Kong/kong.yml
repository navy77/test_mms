          - name: key-auth

  - name: device-daily-service
    url: http://api-rest:8003/api/v1/device/daily
    routes:
      - name: device-daily-route
        paths:
          - /mic/api/v1/device/daily
        strip_path: true
        methods:
          - GET
        plugins:
          - name: rate-limiting
            config:
              minute: 20
              policy: local
          - name: key-auth

  # =========================================================================
  # 3. MONTHLY ENDPOINTS (Rate Limit: 10 req/min + Key-Auth)
  # =========================================================================
  - name: data-monthly-service
    url: http://api-rest:8003/api/v1/data/monthly
    routes:
      - name: data-monthly-route
