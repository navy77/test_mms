_format_version: "3.0"
_transform: true

services:
  # =========================================================================
  # 1. LIVE / CURRENTLY ENDPOINTS (Rate Limit: 20 req/min + Key-Auth)
  # =========================================================================
  - name: data-currently-service
    url: http://api-rest:8003/api/v1/data/currently
    routes:
      - name: data-currently-route
        paths:
          - /mic/api/v1/data/currently
        strip_path: true
        methods:
          - GET
        plugins:
          - name: rate-limiting
            config:
              minute: 20
              policy: local
          - name: key-auth

  - name: status-currently-service
    url: http://api-rest:8003/api/v1/status/currently
    routes:
      - name: status-currently-route
        paths:
          - /mic/api/v1/status/currently
        strip_path: true
        methods:
          - GET
        plugins:
          - name: rate-limiting
            config:
              minute: 20
              policy: local
          - name: key-auth

  - name: alarm-currently-service
    url: http://api-rest:8003/api/v1/alarm/currently
    routes:
      - name: alarm-currently-route
        paths:
          - /mic/api/v1/alarm/currently
        strip_path: true
        methods:
          - GET
        plugins:
          - name: rate-limiting
            config:
              minute: 20
              policy: local
          - name: key-auth

  - name: device-currently-service
    url: http://api-rest:8003/api/v1/device/currently
    routes:
      - name: device-currently-route
        paths:
          - /mic/api/v1/device/currently
