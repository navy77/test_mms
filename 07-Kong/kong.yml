            config:
              minute: 10
              policy: local
          - name: key-auth

  - name: alarm-monthly-service
    url: http://api-rest:8003/api/v1/alarm/monthly
    routes:
      - name: alarm-monthly-route
        paths:
          - /mic/api/v1/alarm/monthly
        strip_path: true
        methods:
          - GET
        plugins:
          - name: rate-limiting
            config:
              minute: 10
              policy: local
          - name: key-auth

  - name: device-monthly-service
    url: http://api-rest:8003/api/v1/device/monthly
    routes:
      - name: device-monthly-route
        paths:
